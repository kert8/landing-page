<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="/styles/header-style.css">
    <link rel="stylesheet" href="/styles/general.css">
    <link rel="stylesheet" href="/styles/content.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header-container">
            <div class="header-logo">
                Header Logo
            </div>
            <div class="header-links-container">
                <div class="header-link">header link one</div>
                <div class="header-link">header link two</div>
                <div class="header-link">header link three</div>
            </div>
        </div>
        <div class="content-container">
            <div class="content">
                <p class="hero-main-text">This website is awesome</p>
                <p class="hero-secondary-text">
                    This website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast
                </p>
                <button class="sign-up-button">
                    Sign up
                </button>
            </div>
            <div class="image-container">
                <p class="image-placeholder-text">
                    this is a placeholder for an image
                </p>
            </div>
        </div>
    </div>
</body>
</html>
